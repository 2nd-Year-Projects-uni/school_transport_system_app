<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers - Admin Panel</title>

    <link rel="stylesheet" href="drivers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="admin-layout">

    <div class="sidebar">
        <button class="back-btn" onclick="location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i> Home
        </button>

        <h2>Drivers</h2>

        <div class="tabs">
            <button class="tab-btn active" data-tab="pending">Pending (<span id="count-pending">0</span>)</button>
            <button class="tab-btn" data-tab="approved">Approved (<span id="count-approved">0</span>)</button>
            <button class="tab-btn" data-tab="declined">Declined (<span id="count-declined">0</span>)</button>
        </div>
    </div>

    <div class="main-content">

        <div id="loading" class="loading-spinner">
            <i class="fa-solid fa-spinner fa-spin"></i> Loading Drivers...
        </div>

        <div id="tab-pending" class="tab-content active">
            <h3>Pending Approvals</h3>
            <div class="grid-container" id="grid-pending"></div>
        </div>

        <div id="tab-approved" class="tab-content">
            <h3>Approved Drivers</h3>
            <div class="grid-container" id="grid-approved"></div>
        </div>

        <div id="tab-declined" class="tab-content">
            <h3>Declined Drivers</h3>
            <div class="grid-container" id="grid-declined"></div>
        </div>

    </div>
</div>

<!-- Modal -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="zoomedImage">
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // 🔥 Safety check
    if (typeof firebaseConfig === "undefined") {
        document.body.innerHTML = "<h2 style='color:red;text-align:center'>config.js missing</h2>";
        return;
    }

    // 🔥 Init Firebase safely
    const app = firebase.apps.length
        ? firebase.app()
        : firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();

    const loadingEl = document.getElementById('loading');

    const gridPending = document.getElementById('grid-pending');
    const gridApproved = document.getElementById('grid-approved');
    const gridDeclined = document.getElementById('grid-declined');

    const countPending = document.getElementById('count-pending');
    const countApproved = document.getElementById('count-approved');
    const countDeclined = document.getElementById('count-declined');

    // 🔐 Protect page
    auth.onAuthStateChanged((user) => {
        if (!user) {
            loadingEl.innerHTML = "<p style='color:red'>Access Denied</p>";
            setTimeout(() => location.href = 'index.html', 1500);
            return;
        }

        fetchDrivers();
    });

    // 🖼 Modal
    const modal = document.getElementById('imageModal');
    const zoomedImage = document.getElementById('zoomedImage');
    const closeModal = document.querySelector('.close-modal');

    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    window.openModal = (src) => {
        modal.style.display = 'flex';
        zoomedImage.src = src;
    };

    // 🔄 Update status
    window.updateDriverStatus = async (uid, newStatus) => {
        const flutterBool = newStatus === 'approved';

        try {
            await db.collection('users').doc(uid).update({
                status: flutterBool,
                approved: flutterBool,
                adminState: newStatus
            });
        } catch (err) {
            alert(err.message);
        }
    };

    function fetchDrivers() {

        db.collection('users')
            .where('userType', '==', 'driver')
            .onSnapshot(snapshot => {

                loadingEl.style.display = 'none';

                gridPending.innerHTML = '';
                gridApproved.innerHTML = '';
                gridDeclined.innerHTML = '';

                let p=0,a=0,d=0;

                snapshot.forEach(doc => {

                    const data = doc.data();
                    const id = doc.id;

                    let state = 'pending';

                    if (data.adminState === 'declined') state = 'declined';
                    else if (data.adminState === 'approved' || data.status === true || data.approved === true)
                        state = 'approved';

                    const imgFront = data.licenseFrontUrl || 'https://placehold.co/400x200';
                    const imgBack = data.licenseBackUrl || 'https://placehold.co/400x200';

                    const card = document.createElement('div');
                    card.className = 'driver-card';

                    card.innerHTML = `
                        <div class="driver-header">
                            <h4>${data.name || 'Unnamed Driver'}</h4>
                        </div>

                        <div class="driver-info">
                            <p>${data.email || ''}</p>
                            <p>${data.phone || ''}</p>
                        </div>

                        <div class="license-images">
                            <img src="${imgFront}" onclick="openModal('${imgFront}')">
                            <img src="${imgBack}" onclick="openModal('${imgBack}')">
                        </div>

                        <div class="actions">
                            ${state === 'pending' ? `
                                <button onclick="updateDriverStatus('${id}','approved')">Approve</button>
                                <button onclick="updateDriverStatus('${id}','declined')">Decline</button>
                            ` : ''}

                            ${state === 'approved' ? `
                                <button onclick="updateDriverStatus('${id}','declined')">Revoke</button>
                            ` : ''}

                            ${state === 'declined' ? `
                                <button onclick="updateDriverStatus('${id}','approved')">Restore</button>
                            ` : ''}
                        </div>
                    `;

                    if(state==='pending'){gridPending.appendChild(card);p++;}
                    else if(state==='approved'){gridApproved.appendChild(card);a++;}
                    else{gridDeclined.appendChild(card);d++;}
                });

                countPending.textContent = p;
                countApproved.textContent = a;
                countDeclined.textContent = d;
            });
    }

    // Tabs
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.onclick = () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        };
    });

});
</script>

</body>
</html>
