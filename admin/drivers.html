<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers - Admin Panel</title>
    <link rel="stylesheet" href="drivers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-arrow-left"></i> Home
            </button>
            <h2>Drivers</h2>
            <div class="tabs">
                <button class="tab-btn active" data-tab="pending">Pending (<span id="count-pending">0</span>)</button>
                <button class="tab-btn" data-tab="approved">Approved (<span id="count-approved">0</span>)</button>
                <button class="tab-btn" data-tab="declined">Declined (<span id="count-declined">0</span>)</button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Loading State -->
            <div id="loading" class="loading-spinner">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading Drivers...
            </div>

            <!-- Pending Tab -->
            <div id="tab-pending" class="tab-content active">
                <h3>Pending Approvals</h3>
                <div class="grid-container" id="grid-pending"></div>
            </div>

            <!-- Approved Tab -->
            <div id="tab-approved" class="tab-content">
                <h3>Approved Drivers</h3>
                <div class="grid-container" id="grid-approved"></div>
            </div>

            <!-- Declined Tab -->
            <div id="tab-declined" class="tab-content">
                <h3>Declined Drivers</h3>
                <div class="grid-container" id="grid-declined"></div>
            </div>
        </div>
    </div>

    <!-- Image Modal for License Zoom -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="zoomedImage">
    </div>

    <!-- Firebase SDK (Compat version for local file:// execution) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        try {
            // Firebase configuration
            const firebaseConfig = {
                apiKey: "***REMOVED***",
                authDomain: "school-transport-system-6eb9f.firebaseapp.com",
                projectId: "school-transport-system-6eb9f",
                storageBucket: "school-transport-system-6eb9f.firebasestorage.app",
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();

            const loadingEl = document.getElementById('loading');
            const gridPending = document.getElementById('grid-pending');
            const gridApproved = document.getElementById('grid-approved');
            const gridDeclined = document.getElementById('grid-declined');

            const countPending = document.getElementById('count-pending');
            const countApproved = document.getElementById('count-approved');
            const countDeclined = document.getElementById('count-declined');

            // Protect the page - must be logged in!
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    loadingEl.innerHTML = '<p style="color:red">Access Denied. Please login first.</p>';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                    return;
                }
                
                // Fetch Drivers since user IS logged in
                fetchDrivers();
            });

            const modal = document.getElementById('imageModal');
            const zoomedImage = document.getElementById('zoomedImage');
            const closeModal = document.querySelector('.close-modal');

            closeModal.onclick = () => {
                modal.classList.remove('show');
                setTimeout(() => { modal.style.display = 'none'; }, 300);
            }
            window.onclick = (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                    setTimeout(() => { modal.style.display = 'none'; }, 300);
                }
            }
            window.openModal = (src) => {
                modal.style.display = 'flex';
                setTimeout(() => {
                    zoomedImage.src = src;
                    modal.classList.add('show');
                }, 10);
            };

            window.updateDriverStatus = async (uid, newStatus) => {
                try {
                    // newStatus is a string ('approved' or 'declined')
                    let flutterBool = false;
                    if (newStatus === 'approved') {
                        flutterBool = true;
                    }
                    await db.collection('users').doc(uid).update({
                        status: flutterBool,         // Strict boolean for Flutter 
                        approved: flutterBool,       // Backward compatibility for old Flutter login logic
                        adminState: newStatus        // For Admin Panel Sorting
                    });
                } catch(err) {
                    console.error("Error updating status:", err);
                    alert("Failed: " + err.message);
                }
            };

            function fetchDrivers() {
                const driversQuery = db.collection('users').where('userType', '==', 'driver');
                driversQuery.onSnapshot((snapshot) => {
                    loadingEl.style.display = 'none';
                    
                    gridPending.innerHTML = '';
                    gridApproved.innerHTML = '';
                    gridDeclined.innerHTML = '';
                    
                    let pCount = 0;
                    let aCount = 0;
                    let dCount = 0;

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const id = doc.id;
                        
                        let currentState = 'pending';
                        if (data.adminState === 'declined') {
                            currentState = 'declined';
                        } else if (data.adminState === 'approved' || data.status === true || data.approved === true) {
                            currentState = 'approved';
                        } else {
                            currentState = 'pending';
                        }
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Import config.js for firebaseConfig (must be present and gitignored) -->
    <script src="config.js"></script>

    <script>
        try {
            // Use firebaseConfig from config.js
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();

            const loadingEl = document.getElementById('loading');
            const gridPending = document.getElementById('grid-pending');
            const gridApproved = document.getElementById('grid-approved');
            const gridDeclined = document.getElementById('grid-declined');

            const countPending = document.getElementById('count-pending');
            const countApproved = document.getElementById('count-approved');
            const countDeclined = document.getElementById('count-declined');

            // Protect the page - must be logged in!
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    loadingEl.innerHTML = '<p style="color:red">Access Denied. Please login first.</p>';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                    return;
                }
                // Fetch Drivers since user IS logged in
                fetchDrivers();
            });

            const modal = document.getElementById('imageModal');
            const zoomedImage = document.getElementById('zoomedImage');
            const closeModal = document.querySelector('.close-modal');

            closeModal.onclick = () => {
                modal.classList.remove('show');
                setTimeout(() => { modal.style.display = 'none'; }, 300);
            }
            window.onclick = (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                    setTimeout(() => { modal.style.display = 'none'; }, 300);
                }
            }
            window.openModal = (src) => {
                modal.style.display = 'flex';
                setTimeout(() => {
                    zoomedImage.src = src;
                    modal.classList.add('show');
                }, 10);
            };

            window.updateDriverStatus = async (uid, newStatus) => {
                try {
                    // newStatus is a string ('approved' or 'declined')
                    let flutterBool = false;
                    if (newStatus === 'approved') {
                        flutterBool = true;
                    }
                    await db.collection('users').doc(uid).update({
                        status: flutterBool,         // Strict boolean for Flutter 
                        approved: flutterBool,       // Backward compatibility for old Flutter login logic
                        adminState: newStatus        // For Admin Panel Sorting
                    });
                } catch(err) {
                    console.error("Error updating status:", err);
                    alert("Failed: " + err.message);
                }
            };

            function fetchDrivers() {
                const driversQuery = db.collection('users').where('userType', '==', 'driver');
                driversQuery.onSnapshot((snapshot) => {
                    loadingEl.style.display = 'none';
                    
                    gridPending.innerHTML = '';
                    gridApproved.innerHTML = '';
                    gridDeclined.innerHTML = '';
                    
                    let pCount = 0;
                    let aCount = 0;
                    let dCount = 0;

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const id = doc.id;
                        
                        let currentState = 'pending';
                        if (data.adminState === 'declined') {
                            currentState = 'declined';
                        } else if (data.adminState === 'approved' || data.status === true || data.approved === true) {
                            currentState = 'approved';
                        } else {
                            currentState = 'pending';
                        }

                        const dateStr = data.createdAt && data.createdAt.toDate ? new Date(data.createdAt.toDate()).toLocaleDateString() : 'N/A';
                        const imgFront = data.licenseFrontUrl || 'https://placehold.co/400x200?text=No+Front+Image';
                        const imgBack = data.licenseBackUrl || 'https://placehold.co/400x200?text=No+Back+Image';
                        
                        const card = document.createElement('div');
                        card.className = 'driver-card';
                        card.innerHTML = `
                            <div class="driver-header">
                                <h4>${data.name || 'Unnamed Driver'}</h4>
                            </div>
                            <div class="driver-info">
                                <p><i class="fa-solid fa-envelope"></i> ${data.email || 'No email'}</p>
                                <p><i class="fa-solid fa-phone"></i> ${data.phone || 'No phone'}</p>
                                <p><i class="fa-solid fa-calendar"></i> Joined: ${dateStr}</p>
                            </div>
                            <div class="license-images">
                                <div>
                                    <img src="${imgFront}" onclick="openModal('${imgFront}')" alt="License Front">
                                    <span>Front</span>
                                </div>
                                <div>
                                    <img src="${imgBack}" onclick="openModal('${imgBack}')" alt="License Back">
                                    <span>Back</span>
                                </div>
                            </div>
                            <div class="actions">
                                ${currentState === 'pending' ? `
                                    <button class="btn-approve" onclick="updateDriverStatus('${id}', 'approved')"><i class="fa-solid fa-check"></i> Approve</button>
                                    <button class="btn-decline" onclick="updateDriverStatus('${id}', 'declined')"><i class="fa-solid fa-xmark"></i> Decline</button>
                                ` : ''}
                                ${currentState === 'approved' ? `
                                    <button class="btn-decline" onclick="updateDriverStatus('${id}', 'declined')"><i class="fa-solid fa-ban"></i> Revoke & Decline</button>
                                ` : ''}
                                ${currentState === 'declined' ? `
                                    <button class="btn-restore" onclick="updateDriverStatus('${id}', 'approved')"><i class="fa-solid fa-rotate-left"></i> Restore</button>
                                ` : ''}
                            </div>
                        `;

                        if (currentState === 'pending') {
                            gridPending.appendChild(card);
                            pCount++;
                        } else if (currentState === 'approved') {
                            gridApproved.appendChild(card);
                            aCount++;
                        } else if (currentState === 'declined') {
                            gridDeclined.appendChild(card);
                            dCount++;
                        }
                    });

                    if(pCount === 0) gridPending.innerHTML = '<p style="color:#777;">No pending approvals.</p>';
                    if(aCount === 0) gridApproved.innerHTML = '<p style="color:#777;">No approved drivers.</p>';
                    if(dCount === 0) gridDeclined.innerHTML = '<p style="color:#777;">No declined drivers.</p>';

                    countPending.textContent = pCount;
                    countApproved.textContent = aCount;
                    countDeclined.textContent = dCount;
                }, (error) => {
                    console.error("Firestore error: ", error);
                    loadingEl.innerHTML = '<p style="color:red"><i class="fa-solid fa-triangle-exclamation"></i> Error loading drivers: ' + error.message + '</p>';
                });
            }

            // Tab Switching Logic
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                });
            });

        } catch (e) {
            document.getElementById('loading').innerHTML = '<p style="color:red">Global Script error: ' + e.message + '</p>';
        }
    </script>
</body>
</html>
