<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - School Van App</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .error-msg {
            color: #EF4444;
            font-size: 14px;
            font-weight: 500;
            display: none;
            background: #FEF2F2;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #FECACA;
            margin-top: -5px;
        }
        .subtitle {
            color: #6B7280;
            font-size: 15px;
            margin-top: -20px;
            margin-bottom: 25px;
        }
        .success-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ECFDF5;
            color: #059669;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #A7F3D0;
            margin: 0 auto 15px auto;
        }
    </style>
</head>

<body>
<div class="container premium">

    <h1><span class="logo-icon"><i class="fa-solid fa-shield-halved"></i></span></h1>

    <p id="loadingState" style="color:#6B7280;font-size:1.1rem;font-weight:500;">
        <i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...
    </p>

    <!-- Login -->
    <div id="loginForm" class="login-section" style="display:none;">
        <p class="subtitle">Secure Administrator Portal</p>

        <input type="email" id="emailInput" class="login-input" placeholder="Admin Email">
        <input type="password" id="passwordInput" class="login-input" placeholder="Secure Password">

        <p id="errorMsg" class="error-msg"></p>

        <button id="loginSubmitBtn" class="login-btn">
            <i class="fa-solid fa-right-to-bracket"></i> Access Portal
        </button>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="selection" style="display:none;">

        <div class="success-badge">
            <i class="fa-solid fa-lock-open"></i> Authentication Verified
        </div>

        <button id="driversBtn" class="select-btn">
            <span class="icon"><i class="fa-solid fa-user-tie"></i></span>
            <span class="label">Manage Drivers</span>
        </button>

        <button id="vehiclesBtn" class="select-btn">
            <span class="icon"><i class="fa-solid fa-shuttle-van"></i></span>
            <span class="label">Manage Vehicles</span>
        </button>

        <button id="showCreateAdminBtn" class="select-btn" style="display:none;">
            <span class="icon"><i class="fa-solid fa-user-plus"></i></span>
            <span class="label">Register New Admin</span>
        </button>

        <button id="logoutBtn" class="logout-btn">
            <i class="fa-solid fa-power-off"></i> Disconnect
        </button>
    </div>

    <!-- Create Admin -->
    <div id="createAdminForm" class="login-section" style="display:none;">

        <p class="subtitle" style="color:#005792;font-weight:600;">SuperAdmin Privilege</p>

        <button id="backToDashBtn" class="logout-btn" style="margin-top:0;">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>

        <input type="email" id="newAdminEmail" class="login-input" placeholder="New Admin Email">
        <input type="password" id="newAdminPassword" class="login-input" placeholder="New Password">

        <p id="createAdminMsg" class="error-msg"></p>

        <button id="submitNewAdminBtn" class="login-btn">
            <i class="fa-solid fa-plus"></i> Create Admin Account
        </button>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // ✅ Safety check
    if (typeof firebaseConfig === 'undefined') {
        document.body.innerHTML = "<h2 style='color:red;text-align:center'>config.js missing</h2>";
        return;
    }

    // ✅ Init Firebase safely
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const secondaryApp = firebase.apps.find(a => a.name === "Secondary")
        || firebase.initializeApp(firebaseConfig, "Secondary");

    const auth = firebase.auth();
    const db = firebase.firestore();
    const secondaryAuth = secondaryApp.auth();

    // Elements
    const loadingState = document.getElementById('loadingState');
    const loginForm = document.getElementById('loginForm');
    const dashboardSection = document.getElementById('dashboardSection');
    const errorMsg = document.getElementById('errorMsg');
    const showCreateAdminBtn = document.getElementById('showCreateAdminBtn');
    const createAdminForm = document.getElementById('createAdminForm');
    const createAdminMsg = document.getElementById('createAdminMsg');
    const submitNewAdminBtn = document.getElementById('submitNewAdminBtn');
    const newAdminEmail = document.getElementById('newAdminEmail');
    const newAdminPassword = document.getElementById('newAdminPassword');
    const backToDashBtn = document.getElementById('backToDashBtn');

    // Auth state
    auth.onAuthStateChanged(async (user) => {

        loadingState.style.display = 'none';

        if (user) {
            loginForm.style.display = 'none';
            createAdminForm.style.display = 'none';
            dashboardSection.style.display = 'flex';

            document.querySelector('h1').innerHTML =
                '<span class="logo-icon"><i class="fa-solid fa-school"></i></span> Portal Access';

            try {
                const doc = await db.collection('superadmins').doc(user.uid).get();
                if (doc.exists) {
                    showCreateAdminBtn.style.display = 'flex';
                }
            } catch (err) {
                console.log(err);
            }

        } else {
            dashboardSection.style.display = 'none';
            createAdminForm.style.display = 'none';
            loginForm.style.display = 'flex';
            showCreateAdminBtn.style.display = 'none';
        }
    });

    // Login
    document.getElementById('loginSubmitBtn').onclick = () => {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;

        errorMsg.style.display = 'none';

        auth.signInWithEmailAndPassword(email, password)
            .catch(err => {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            });
    };

    // Navigation
    document.getElementById('driversBtn').onclick = () => location.href = 'drivers.html';
    document.getElementById('vehiclesBtn').onclick = () => location.href = 'vehicles.html';

    // Logout
    document.getElementById('logoutBtn').onclick = () => auth.signOut();
    // Show Create Admin form
    if (showCreateAdminBtn) {
        showCreateAdminBtn.onclick = () => {
            dashboardSection.style.display = 'none';
            createAdminForm.style.display = 'flex';
            createAdminMsg.textContent = '';
            createAdminMsg.style.display = 'none';
            newAdminEmail.value = '';
            newAdminPassword.value = '';
        };
    }

    // Back to dashboard from Create Admin form
    if (backToDashBtn) {
        backToDashBtn.onclick = () => {
            createAdminForm.style.display = 'none';
            dashboardSection.style.display = 'flex';
            createAdminMsg.textContent = '';
            createAdminMsg.style.display = 'none';
        };
    }

    // Handle Create Admin submission
    if (submitNewAdminBtn) {
        submitNewAdminBtn.onclick = async () => {
            const email = newAdminEmail.value.trim();
            const password = newAdminPassword.value;
            createAdminMsg.style.display = 'none';
            createAdminMsg.textContent = '';

            if (!email || !password) {
                createAdminMsg.textContent = 'Please enter email and password.';
                createAdminMsg.style.display = 'block';
                return;
            }

            submitNewAdminBtn.disabled = true;
            submitNewAdminBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
            try {
                // Create user with secondary auth
                const userCredential = await secondaryAuth.createUserWithEmailAndPassword(email, password);
                const newUser = userCredential.user;

                // Add to 'admins' collection in Firestore
                await db.collection('admins').doc(newUser.uid).set({
                    email: email,
                    createdAt: new Date(),
                    createdBy: auth.currentUser ? auth.currentUser.uid : null,
                    role: 'admin'
                });

                createAdminMsg.textContent = 'Admin account created successfully!';
                createAdminMsg.style.display = 'block';
                createAdminMsg.style.color = '#059669';
                newAdminEmail.value = '';
                newAdminPassword.value = '';
            } catch (err) {
                createAdminMsg.textContent = err.message || 'Failed to create admin.';
                createAdminMsg.style.display = 'block';
                createAdminMsg.style.color = '#EF4444';
            } finally {
                submitNewAdminBtn.disabled = false;
                submitNewAdminBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Create Admin Account';
            }
        };
    }

});
</script>

</body>
</html>
