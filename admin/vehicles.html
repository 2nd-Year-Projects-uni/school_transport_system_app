<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles Management - Admin Panel</title>

    <link rel="stylesheet" href="drivers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- Your config -->
    <script src="config.js"></script>
</head>

<body>
<div class="admin-layout">
    
    <!-- Sidebar -->
    <div class="sidebar">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fa-solid fa-arrow-left"></i> Home
        </button>

        <h2>Vehicles</h2>

        <div class="tabs">
            <button class="tab-btn active" data-tab="pending">
                Pending (<span id="count-pending">0</span>)
            </button>

            <button class="tab-btn" data-tab="approved">
                Approved (<span id="count-approved">0</span>)
            </button>

            <button class="tab-btn" data-tab="declined">
                Declined (<span id="count-declined">0</span>)
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="main-content">

        <div id="loading" class="loading-spinner">
            <i class="fa-solid fa-spinner fa-spin"></i> Loading Vehicles...
        </div>

        <div id="tab-pending" class="tab-content active">
            <h3>Pending Approvals</h3>
            <div class="grid-container" id="grid-pending"></div>
        </div>

        <div id="tab-approved" class="tab-content">
            <h3>Approved Vehicles</h3>
            <div class="grid-container" id="grid-approved"></div>
        </div>

        <div id="tab-declined" class="tab-content">
            <h3>Declined Vehicles</h3>
            <div class="grid-container" id="grid-declined"></div>
        </div>

    </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="zoomedImage">
</div>

<script>
try {

    // Init Firebase (ONLY ONCE)
    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();
    const auth = firebase.auth();

    const loadingEl = document.getElementById('loading');

    const gridPending = document.getElementById('grid-pending');
    const gridApproved = document.getElementById('grid-approved');
    const gridDeclined = document.getElementById('grid-declined');

    const countPending = document.getElementById('count-pending');
    const countApproved = document.getElementById('count-approved');
    const countDeclined = document.getElementById('count-declined');

    // Auth check
    auth.onAuthStateChanged((user) => {
        if (!user) {
            loadingEl.innerHTML = '<p style="color:red">Access Denied. Please login first.</p>';
            setTimeout(() => window.location.href = 'index.html', 1500);
            return;
        }
        fetchVehicles();
    });

    // Modal
    const modal = document.getElementById('imageModal');
    const zoomedImage = document.getElementById('zoomedImage');
    const closeModal = document.querySelector('.close-modal');

    closeModal.onclick = () => {
        modal.style.display = 'none';
    };

    window.onclick = (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    };

    window.openModal = (src) => {
        modal.style.display = 'flex';
        zoomedImage.src = src;
    };

    // Update status
    window.updateVehicleStatus = async (vehicleId, newStatus) => {
        try {
            const flutterBool = newStatus === 'approved';

            await db.collection('vehicles').doc(vehicleId).update({
                status: flutterBool,
                adminState: newStatus
            });

        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
        }
    };

    // Fetch vehicles
    function fetchVehicles() {

        db.collection('vehicles').onSnapshot((snapshot) => {

            loadingEl.style.display = 'none';

            gridPending.innerHTML = '';
            gridApproved.innerHTML = '';
            gridDeclined.innerHTML = '';

            let p = 0, a = 0, d = 0;

            snapshot.forEach(doc => {

                const data = doc.data();
                const id = doc.id;

                let state = 'pending';

                if (data.adminState === 'declined') {
                    state = 'declined';
                } else if (data.adminState === 'approved' || data.status === true) {
                    state = 'approved';
                }

                const img = data.vehiclePhotoUrl || 'https://placehold.co/400x200';

                const card = document.createElement('div');
                card.className = 'driver-card';

                card.innerHTML = `
                    <h4>${data.registerNumber || 'No Reg'}</h4>

                    <img src="${img}" onclick="openModal('${img}')" style="height:140px">

                    <p>${data.vehicleType || 'Vehicle'}</p>

                    <div class="actions">
                        ${state === 'pending' ? `
                            <button onclick="updateVehicleStatus('${id}','approved')">Approve</button>
                            <button onclick="updateVehicleStatus('${id}','declined')">Decline</button>
                        ` : ''}

                        ${state === 'approved' ? `
                            <button onclick="updateVehicleStatus('${id}','declined')">Revoke</button>
                        ` : ''}

                        ${state === 'declined' ? `
                            <button onclick="updateVehicleStatus('${id}','approved')">Restore</button>
                        ` : ''}
                    </div>
                `;

                if (state === 'pending') {
                    gridPending.appendChild(card); p++;
                }
                else if (state === 'approved') {
                    gridApproved.appendChild(card); a++;
                }
                else {
                    gridDeclined.appendChild(card); d++;
                }

            });

            countPending.textContent = p;
            countApproved.textContent = a;
            countDeclined.textContent = d;

        });
    }

    // Tabs
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {

            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(c => c.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

} catch (e) {
    document.getElementById('loading').innerHTML =
        '<p style="color:red">Error: ' + e.message + '</p>';
}
</script>

</body>
</html>
